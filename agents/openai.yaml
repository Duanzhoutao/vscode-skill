interface:
  display_name: "VS Code"
  short_description: "Cross-platform skill for configuring and operating VS Code-family IDEs (VS Code, Insiders, Cursor, VSCodium) via CLI and structured JSON. Settings, extensions, Python interpreter, SSH/WSL Remote, tasks/launch templates, profiles, settings sync. Python gateway works on Windows, macOS, and Linux."
  default_prompt: "Use $vscode to configure and operate VS Code-family IDEs such as VS Code, VS Code Insiders, Cursor, and VSCodium. The default entry point is the cross-platform Python gateway at scripts/vscode_skill.py; on Windows it forwards to the PowerShell driver vscode-cli.ps1, on macOS and Linux it implements core areas natively in Python. Prefer the product CLI and structured JSON config files over ad-hoc edits. Resolve the target CLI and user data paths through environment variables (VSCODE_CODE_CLI, VSCODE_INSIDERS_CLI, VSCODE_SKILL_CONFIG, VSCODE_SKILL_TEMP) and the config file before falling back to platform defaults. Classify every write as read-only inspection, project configuration, or user/global configuration; for user/global writes state the product, file, key, old value when readable, new value, and rollback path before applying --Apply. Use settings set, ext install, python set-interpreter, ssh open, wsl open, tasks init, launch init, extensions install/pin, settings-sync status, profile list/show, and workspace info/folder-settings-set with explicit arguments; never assume paths are portable across machines. When unsure which setting key controls a behavior, consult references/settings-index.md; when writing .vscode/tasks.json or .vscode/launch.json from scratch, use the bundled templates under references/templates/tasks or references/templates/launch. Never enable or disable Settings Sync programmatically."