name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  basic:
    name: Python + PowerShell basic tests
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup PowerShell 7
        shell: pwsh
        run: |
          if (Get-Command pwsh -ErrorAction SilentlyContinue) {
            pwsh -NoProfile -Command '$PSVersionTable.PSVersion'
          } else {
            Write-Host "pwsh not pre-installed; relying on default PowerShell."
          }

      - name: Validate SKILL.md frontmatter
        shell: pwsh
        run: |
          $content = Get-Content -LiteralPath "SKILL.md" -Encoding UTF8 -Raw
          if ($content -notmatch '(?ms)^---\s*\r?\n(.*?)\r?\n---') {
            throw "SKILL.md is missing YAML frontmatter."
          }
          $front = $Matches[1]
          $required = @("name", "description")
          foreach ($key in $required) {
            if ($front -notmatch "(?m)^${key}\s*:") {
              throw "SKILL.md frontmatter missing required key: $key"
            }
          }
          if ($front -match "(?m)^name\s*:\s*['\"]?([^'\"\s]+)") {
            $name = $Matches[1].Trim()
            if ($name -cnotmatch '^[a-z0-9][a-z0-9\-]*$') {
              throw "SKILL.md name '$name' must be lowercase ASCII slug."
            }
          }
          Write-Host "SKILL.md frontmatter OK"

      - name: Validate agents/openai.yaml
        shell: pwsh
        run: |
          python -X utf8 -c "import yaml,sys; d=yaml.safe_load(open('agents/openai.yaml',encoding='utf-8')); assert 'interface' in d and 'display_name' in d['interface'], 'missing display_name'; print('openai.yaml OK')"

      - name: Parse-check PowerShell scripts
        shell: pwsh
        run: |
          $tokens = $null
          foreach ($file in @("scripts/vscode-cli.ps1", "scripts/init-config.ps1", "scripts/setup-local-sshd.ps1")) {
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count) {
              $errors | Format-List Message, Extent
              throw "Parse error in $file"
            }
            Write-Host "$file : parse OK"
          }

      - name: Compile Python gateway and test runner
        shell: pwsh
        run: |
          python -X utf8 -m py_compile scripts/vscode_skill.py
          python -X utf8 -m py_compile scripts/run_vscode_skill_tests.py
          Write-Host "py_compile OK"

      - name: Run basic tests
        shell: pwsh
        run: |
          python -X utf8 scripts/run_vscode_skill_tests.py --basic --clean